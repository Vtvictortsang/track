<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卓越求職網 - 權限隔離控制台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Firebase 配置
const firebaseConfig = {
  apiKey: "AIzaSyBGQYGg1vet5xNc81xV-vLz3e6TBaPVPa0",
  authDomain: "jobportal123-25cae.firebaseapp.com",
  projectId: "jobportal123-25cae",
  storageBucket: "jobportal123-25cae.firebasestorage.app",
  messagingSenderId: "434704669042",
  appId: "1:434704669042:web:eaa17580554404b8b9a5eb",
  measurementId: "G-F1N55YN8CR"
};


        const ADMIN_EMAIL = "vt.victortsang@gmail.com"; 
        let auth = null;
        window.currentUser = null;
        window.isAdmin = false;

        const isFirebaseEnabled = firebaseConfig.apiKey && firebaseConfig.apiKey !== "";

        if (isFirebaseEnabled) {
            try {
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                const provider = new GoogleAuthProvider();

                onAuthStateChanged(auth, (user) => {
                    window.currentUser = user;
                    window.isAdmin = user && user.email === ADMIN_EMAIL;
                    updateAuthUI(user);
                });

                window.handleGoogleLogin = async () => {
                    try {
                        const result = await signInWithPopup(auth, provider);
                        window.currentUser = result.user;
                        window.isAdmin = result.user.email === ADMIN_EMAIL;
                        document.getElementById('login-modal').classList.add('hidden');
                    } catch (error) {
                        console.error("登入失敗:", error);
                    }
                };

                window.handleLogout = () => signOut(auth);
            } catch (e) {
                setupDemoMode();
            }
        } else {
            setupDemoMode();
        }

        function setupDemoMode() {
            window.isDemoMode = true;
            window.handleGoogleLogin = (role) => {
                // 模擬不同身份登入測試
                if (role === 'admin') {
                    window.currentUser = { uid: "admin_001", displayName: "系統管理員", email: ADMIN_EMAIL };
                    window.isAdmin = true;
                } else {
                    window.currentUser = { uid: "employer_" + Math.floor(Math.random()*1000), displayName: "普通僱主", email: "employer@test.com" };
                    window.isAdmin = false;
                }
                updateAuthUI(window.currentUser);
                document.getElementById('login-modal').classList.add('hidden');
            };
            window.handleLogout = () => {
                window.currentUser = null;
                window.isAdmin = false;
                updateAuthUI(null);
            };
            setTimeout(() => updateAuthUI(null), 100);
        }

        function updateAuthUI(user) {
            const loginBtn = document.getElementById('login-btn');
            const userInfo = document.getElementById('user-info');
            const userName = document.getElementById('user-name');
            const employerZone = document.getElementById('employer-zone');
            const adminBadge = document.getElementById('admin-badge');

            if (user) {
                if (loginBtn) loginBtn.classList.add('hidden');
                if (userInfo) userInfo.classList.remove('hidden');
                if (userName) userName.innerText = user.displayName;
                if (employerZone) employerZone.classList.remove('hidden');
                if (adminBadge) adminBadge.classList.toggle('hidden', !window.isAdmin);
                
                renderJobs(); 
                renderApplicants(); 
            } else {
                if (loginBtn) loginBtn.classList.remove('hidden');
                if (userInfo) userInfo.classList.add('hidden');
                if (employerZone) employerZone.classList.add('hidden');
                if (adminBadge) adminBadge.classList.add('hidden');
            }
        }
    </script>

    <style>
        .job-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative; }
        .job-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        .job-card.pinned { border: 2px solid #fbbf24; background: linear-gradient(to bottom right, #fff, #fffbeb); }
        .modal-overlay { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(8px); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

    <nav class="bg-white/80 backdrop-blur-md shadow-sm px-6 py-4 sticky top-0 z-50 flex justify-between items-center border-b border-slate-100">
        <div class="flex items-center gap-8">
            <h1 class="text-2xl font-black text-blue-600 tracking-tight">JobPortal</h1>
            <span id="admin-badge" class="hidden bg-amber-100 text-amber-700 text-[10px] px-3 py-1 rounded-full font-black uppercase tracking-widest border border-amber-200">系統管理員</span>
        </div>
        <div id="auth-section">
            <button onclick="document.getElementById('login-modal').classList.remove('hidden')" id="login-btn" class="bg-slate-900 text-white px-6 py-2 rounded-full hover:bg-blue-600 transition font-bold text-sm">
                登入入口
            </button>
            <div id="user-info" class="hidden flex items-center gap-4">
                <div class="flex flex-col items-end">
                    <span class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">控制台</span>
                    <span id="user-name" class="text-sm font-bold text-slate-800"></span>
                </div>
                <button onclick="handleLogout()" class="p-2 hover:bg-red-50 rounded-full transition">
                    <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-6 mt-6">
        <!-- 訪客視圖：所有人可見 -->
        <section class="mb-16">
            <div class="flex justify-between items-center mb-8 bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                <h3 class="text-xl font-black text-slate-800">最新招聘職位</h3>
                <span class="text-xs text-slate-400 font-bold">目前共有 <span id="job-count">0</span> 個職位</span>
            </div>
            <div id="visitor-job-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </section>

        <!-- 僱主/管理員私有區域 -->
        <div id="employer-zone" class="hidden space-y-10 border-t-2 border-slate-200 border-dashed pt-16 animate-fadeIn pb-20">
            <div class="bg-slate-900 rounded-3xl p-8 text-white flex flex-col md:flex-row md:items-center justify-between gap-6 shadow-2xl">
                <div>
                    <h2 class="text-3xl font-black" id="zone-title">管理中心</h2>
                    <p class="text-slate-400">管理您發布的職位與收到的申請</p>
                </div>
                <button onclick="togglePostForm()" class="bg-blue-600 text-white px-8 py-4 rounded-2xl font-black hover:bg-blue-700 transition shadow-lg">發布新職位</button>
            </div>
            
            <section id="post-form" class="hidden bg-white p-10 rounded-3xl shadow-xl border border-slate-100">
                <h3 id="form-title" class="text-xl font-black mb-8 border-b pb-4 text-slate-800">發布新職位</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                    <div class="space-y-4">
                        <label class="text-sm font-black text-slate-500 uppercase ml-2">公司 LOGO</label>
                        <div onclick="document.getElementById('job-logo-input').click()" class="border-2 border-dashed border-slate-200 rounded-3xl h-48 flex flex-col items-center justify-center cursor-pointer hover:border-blue-400 hover:bg-blue-50 transition overflow-hidden bg-slate-50">
                            <img id="logo-preview-img" src="" class="hidden w-full h-full object-cover">
                            <div id="logo-placeholder" class="text-center p-4">
                                <svg class="w-10 h-10 text-slate-300 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                                <span class="text-xs font-bold text-slate-400">點擊上傳</span>
                            </div>
                        </div>
                        <input type="file" id="job-logo-input" accept="image/*" class="hidden" onchange="previewLogo(this)">
                    </div>

                    <div class="md:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-6">
                        <input type="hidden" id="edit-job-id">
                        <input type="text" id="job-title" placeholder="職位名稱" class="w-full bg-slate-50 p-4 rounded-2xl border-2 border-transparent focus:border-blue-500 transition outline-none">
                        <input type="text" id="job-company" placeholder="公司名稱" class="w-full bg-slate-50 p-4 rounded-2xl border-2 border-transparent focus:border-blue-500 transition outline-none">
                        <input type="text" id="job-salary" placeholder="薪資待遇 (例: HK$ 20k-25k)" class="w-full bg-slate-50 p-4 rounded-2xl border-2 border-transparent focus:border-blue-500 transition outline-none">
                        <input type="text" id="job-location" placeholder="工作地點" class="w-full bg-slate-50 p-4 rounded-2xl border-2 border-transparent focus:border-blue-500 transition outline-none">
                        <textarea id="job-desc" placeholder="職位描述與要求..." class="w-full bg-slate-50 p-4 rounded-2xl border-2 border-transparent focus:border-blue-500 transition min-h-[150px] md:col-span-2 outline-none"></textarea>
                        <button onclick="saveJob()" class="bg-blue-600 text-white py-5 rounded-2xl font-black hover:bg-blue-700 transition md:col-span-2">確認發布</button>
                    </div>
                </div>
            </section>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
                <div class="lg:col-span-2 space-y-6">
                    <h3 class="font-black text-slate-800 text-lg flex items-center gap-2">我的招聘列表 <span class="text-xs bg-slate-100 text-slate-400 px-2 py-1 rounded-lg" id="my-job-count">0</span></h3>
                    <div id="employer-job-list" class="space-y-4"></div>
                </div>
                <div class="space-y-6">
                    <h3 class="font-black text-slate-800 text-lg flex items-center gap-2">應徵者管理</h3>
                    <div id="applicant-list" class="space-y-4"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- 應徵彈窗 -->
    <div id="apply-modal" class="fixed inset-0 modal-overlay z-[200] hidden flex items-center justify-center p-6">
        <div class="bg-white rounded-[40px] p-10 max-w-lg w-full shadow-2xl animate-fadeIn">
            <h3 class="text-2xl font-black mb-1 text-slate-800">提交應徵申請</h3>
            <p id="apply-job-name" class="text-blue-600 font-bold mb-8 text-sm uppercase tracking-wide"></p>
            <div class="space-y-5">
                <input type="text" id="apply-name" placeholder="您的姓名" class="w-full bg-slate-50 p-4 rounded-2xl border-2 border-transparent focus:border-blue-500 transition outline-none font-bold">
                <input type="text" id="apply-phone" placeholder="WhatsApp / 電話" class="w-full bg-slate-50 p-4 rounded-2xl border-2 border-transparent focus:border-blue-500 transition outline-none font-bold">
                <textarea id="apply-exp" placeholder="簡述您的相關經驗..." class="w-full bg-slate-50 p-4 rounded-2xl border-2 border-transparent focus:border-blue-500 transition min-h-[120px] outline-none"></textarea>
                <div class="pt-4 flex gap-4">
                    <button onclick="closeApplyModal()" class="flex-1 py-4 text-slate-400 font-bold hover:bg-slate-50 rounded-2xl transition">取消</button>
                    <button onclick="submitApplication()" class="flex-[2] py-4 bg-blue-600 text-white rounded-2xl font-black hover:bg-blue-700 transition shadow-lg">確認送出</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 登入入口 -->
    <div id="login-modal" class="fixed inset-0 modal-overlay z-[100] hidden flex items-center justify-center p-6">
        <div class="bg-white rounded-[40px] p-10 max-w-md w-full shadow-2xl text-center">
            <h3 class="text-3xl font-black mb-2 text-slate-800">登入系統</h3>
            <p class="text-slate-400 mb-8 font-medium">請選擇您的身份（演示模式）</p>
            <div class="space-y-4">
                <button onclick="handleGoogleLogin('employer')" class="w-full bg-white border-2 border-slate-100 flex items-center justify-between p-6 rounded-3xl hover:border-blue-500 transition group">
                    <div class="text-left">
                        <div class="font-black text-slate-800 group-hover:text-blue-600">普通僱主登入</div>
                        <div class="text-xs text-slate-400">僅能管理自己發布的職位</div>
                    </div>
                    <span class="bg-slate-50 text-xl p-3 rounded-2xl group-hover:bg-blue-50 transition">🏢</span>
                </button>
                <button onclick="handleGoogleLogin('admin')" class="w-full bg-white border-2 border-slate-100 flex items-center justify-between p-6 rounded-3xl hover:border-amber-500 transition group">
                    <div class="text-left">
                        <div class="font-black text-slate-800 group-hover:text-amber-600">系統管理員登入</div>
                        <div class="text-xs text-slate-400">擁有最高權限，可管理所有職位</div>
                    </div>
                    <span class="bg-slate-50 text-xl p-3 rounded-2xl group-hover:bg-amber-50 transition">🔑</span>
                </button>
            </div>
            <button onclick="document.getElementById('login-modal').classList.add('hidden')" class="mt-8 text-slate-300 font-bold text-sm">暫不登入</button>
        </div>
    </div>

    <script>
        // 核心資料結構
        // 每個 Job 都有 ownerId
        let jobs = [
            {
                id: 1, 
                ownerId: "admin_001",
                title: "資深軟體工程師", 
                company: "Google HK", 
                salary: "HK$ 50k - 80k", 
                location: "尖沙咀", 
                desc: "負責核心系統開發與架構設計。", 
                logo: "", 
                expiryDate: Date.now() + 604800000, 
                isPinned: true
            }
        ];
        // 每個 Applicant 都有 jobOwnerId，用於過濾顯示
        let applicants = [];
        let currentLogoBase64 = "";
        let currentApplyJobId = null;

        function togglePostForm() {
            const form = document.getElementById('post-form');
            form.classList.toggle('hidden');
            if(form.classList.contains('hidden')) resetForm();
        }

        function previewLogo(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    currentLogoBase64 = e.target.result;
                    const preview = document.getElementById('logo-preview-img');
                    preview.src = currentLogoBase64;
                    preview.classList.remove('hidden');
                    document.getElementById('logo-placeholder').classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        }

        function resetForm() {
            document.getElementById('edit-job-id').value = '';
            document.getElementById('job-title').value = '';
            document.getElementById('job-company').value = '';
            document.getElementById('job-salary').value = '';
            document.getElementById('job-location').value = '';
            document.getElementById('job-desc').value = '';
            document.getElementById('logo-preview-img').classList.add('hidden');
            document.getElementById('logo-placeholder').classList.remove('hidden');
            document.getElementById('form-title').innerText = "發布新職位";
            currentLogoBase64 = "";
        }

        function saveJob() {
            if (!window.currentUser) return;
            const id = document.getElementById('edit-job-id').value;
            const title = document.getElementById('job-title').value;
            const company = document.getElementById('job-company').value;
            const salary = document.getElementById('job-salary').value;
            const location = document.getElementById('job-location').value;
            const desc = document.getElementById('job-desc').value;

            if (!title || !company) {
                alert("請填寫必要資訊");
                return;
            }

            if (id) {
                // 編輯模式：驗證權限 (必須是作者或管理員)
                const idx = jobs.findIndex(j => j.id == id);
                if (idx !== -1) {
                    if (jobs[idx].ownerId !== window.currentUser.uid && !window.isAdmin) {
                        alert("您沒有權限修改此職位");
                        return;
                    }
                    jobs[idx] = { ...jobs[idx], title, company, salary, location, desc, logo: currentLogoBase64 || jobs[idx].logo };
                }
            } else {
                // 新增模式
                const now = Date.now();
                jobs.unshift({
                    id: now,
                    ownerId: window.currentUser.uid,
                    title, company, salary, location, desc,
                    logo: currentLogoBase64,
                    expiryDate: now + (7 * 24 * 60 * 60 * 1000),
                    isPinned: false
                });
            }
            resetForm();
            togglePostForm();
            renderJobs();
        }

        window.openApplyModal = (jobId) => {
            const job = jobs.find(j => j.id === jobId);
            if (!job) return;
            currentApplyJobId = jobId;
            document.getElementById('apply-job-name').innerText = `${job.title} @ ${job.company}`;
            document.getElementById('apply-modal').classList.remove('hidden');
        };

        window.closeApplyModal = () => {
            document.getElementById('apply-modal').classList.add('hidden');
            document.getElementById('apply-name').value = '';
            document.getElementById('apply-phone').value = '';
            document.getElementById('apply-exp').value = '';
        };

        window.submitApplication = () => {
            const name = document.getElementById('apply-name').value;
            const phone = document.getElementById('apply-phone').value;
            const exp = document.getElementById('apply-exp').value;
            const job = jobs.find(j => j.id === currentApplyJobId);

            if (!name || !phone || !exp) return alert('請填寫完整');

            applicants.unshift({
                id: Date.now(),
                jobId: job.id,
                jobOwnerId: job.ownerId, // 記錄誰是這則招聘的發布者
                name, phone, experience: exp,
                jobTitle: job.title,
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            });

            renderApplicants();
            closeApplyModal();
            alert("申請已成功送出！");
        };

        // 權限操作邏輯
        window.deleteJob = (jobId) => {
            const job = jobs.find(j => j.id === jobId);
            if (!job) return;
            // 只有管理員或職位發布者可以刪除
            if (window.isAdmin || job.ownerId === window.currentUser.uid) {
                if (confirm('確定要刪除此招聘嗎？')) {
                    jobs = jobs.filter(j => j.id !== jobId);
                    renderJobs();
                }
            } else {
                alert("您無權執行此操作");
            }
        };

        window.editJob = (jobId) => {
            const job = jobs.find(j => j.id === jobId);
            if (!job) return;
            if (window.isAdmin || job.ownerId === window.currentUser.uid) {
                document.getElementById('edit-job-id').value = job.id;
                document.getElementById('job-title').value = job.title;
                document.getElementById('job-company').value = job.company;
                document.getElementById('job-salary').value = job.salary;
                document.getElementById('job-location').value = job.location;
                document.getElementById('job-desc').value = job.desc;
                if(job.logo) {
                    document.getElementById('logo-preview-img').src = job.logo;
                    document.getElementById('logo-preview-img').classList.remove('hidden');
                    document.getElementById('logo-placeholder').classList.add('hidden');
                }
                document.getElementById('form-title').innerText = "編輯招聘資訊";
                document.getElementById('post-form').classList.remove('hidden');
                window.scrollTo({ top: 400, behavior: 'smooth' });
            } else {
                alert("您無權編輯他人的職位");
            }
        };

        window.togglePin = (jobId) => {
            if (!window.isAdmin) return alert("只有管理員可以置頂職位");
            const idx = jobs.findIndex(j => j.id === jobId);
            if (idx !== -1) {
                jobs[idx].isPinned = !jobs[idx].isPinned;
                renderJobs();
            }
        };

        function renderJobs() {
            const visitorList = document.getElementById('visitor-job-list');
            const employerList = document.getElementById('employer-job-list');
            if (!visitorList || !employerList || !window.currentUser) return;

            // 1. 全球可見列表 (訪客視圖)
            const sortedJobs = [...jobs].sort((a, b) => b.isPinned - a.isPinned || b.id - a.id);
            document.getElementById('job-count').innerText = sortedJobs.length;
            
            visitorList.innerHTML = sortedJobs.map(job => `
                <div class="job-card bg-white p-8 rounded-[32px] border border-slate-100 shadow-sm flex flex-col h-full ${job.isPinned ? 'pinned' : ''}">
                    <div class="flex items-center gap-4 mb-6">
                        ${job.logo ? `<img src="${job.logo}" class="w-14 h-14 rounded-2xl object-cover">` : `<div class="w-14 h-14 bg-slate-50 flex items-center justify-center font-black text-xl rounded-2xl">${job.company[0]}</div>`}
                        <div class="overflow-hidden">
                            <h3 class="font-black text-lg text-slate-800 leading-tight truncate">${job.title}</h3>
                            <p class="text-blue-600 text-xs font-bold mt-1 uppercase">${job.company}</p>
                        </div>
                    </div>
                    <p class="text-slate-500 text-sm mb-8 flex-grow line-clamp-3">${job.desc}</p>
                    <button onclick="openApplyModal(${job.id})" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-black hover:bg-blue-600 transition">立即應徵</button>
                </div>
            `).join('');

            // 2. 權限過濾列表 (管理區域)
            // 如果是管理員，顯示全部；如果是普通用戶，只顯示自己的
            const visibleForMe = window.isAdmin ? sortedJobs : sortedJobs.filter(j => j.ownerId === window.currentUser.uid);
            document.getElementById('my-job-count').innerText = visibleForMe.length;

            employerList.innerHTML = visibleForMe.map(job => `
                <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm flex items-center gap-6">
                    <div class="flex-grow">
                        <div class="flex items-center gap-2">
                            <h4 class="font-black text-slate-800">${job.title}</h4>
                            ${job.ownerId !== window.currentUser.uid ? '<span class="text-[8px] bg-slate-100 text-slate-400 px-2 py-0.5 rounded-full font-black">他人職位</span>' : ''}
                        </div>
                        <p class="text-[10px] font-bold text-slate-400 uppercase mt-1">${job.company} • 發布者 ID: ${job.ownerId.slice(0,8)}...</p>
                    </div>
                    <div class="flex items-center gap-2">
                        ${window.isAdmin ? `
                        <button onclick="togglePin(${job.id})" class="p-2 rounded-xl ${job.isPinned ? 'bg-amber-100 text-amber-600' : 'bg-slate-50 text-slate-400'}">
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M5 4a2 2 0 012-2h6a2 2 0 012 2v14l-5-2.5L5 18V4z"></path></svg>
                        </button>` : ''}
                        <button onclick="editJob(${job.id})" class="p-2 bg-blue-50 text-blue-600 rounded-xl hover:bg-blue-100">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                        </button>
                        <button onclick="deleteJob(${job.id})" class="p-2 bg-red-50 text-red-600 rounded-xl hover:bg-red-100">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function renderApplicants() {
            const list = document.getElementById('applicant-list');
            if(!list || !window.currentUser) return;

            // 重要邏輯：管理員看全部，普通僱主只看申請自己職位的人
            const myApplicants = window.isAdmin ? applicants : applicants.filter(a => a.jobOwnerId === window.currentUser.uid);

            if(myApplicants.length === 0) {
                list.innerHTML = `<div class="text-center py-10 bg-slate-50 rounded-3xl text-slate-400 text-sm border-2 border-dashed border-slate-100">尚無應徵申請</div>`;
                return;
            }

            list.innerHTML = myApplicants.map(a => `
                <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                    <div class="flex justify-between items-start mb-2">
                        <span class="font-black text-slate-800">${a.name}</span>
                        <span class="text-[10px] font-black text-slate-300 uppercase">${a.time}</span>
                    </div>
                    <p class="text-[10px] font-black text-blue-600 bg-blue-50 inline-block px-2 py-0.5 rounded-md mb-3">應徵：${a.jobTitle}</p>
                    <div class="text-xs text-slate-500 font-bold mb-3">📞 ${a.phone}</div>
                    <div class="bg-slate-50 p-3 rounded-2xl text-xs text-slate-600 italic">"${a.experience}"</div>
                </div>
            `).join('');
        }

        window.onload = () => { renderJobs(); renderApplicants(); }
    </script>
</body>
</html>

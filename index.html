<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卓越求職網 - 探索你的職業機會</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 Firebase SDK (模組化版本) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // --- 請將下方的配置替換為你在 Firebase Console 獲得的真實資料 ---
        // 獲取路徑：專案設定 -> 一般 -> 您的應用程式 -> SDK 設定和配置
        const firebaseConfig = {
  apiKey: "AIzaSyBGQYGg1vet5xNc81xV-vLz3e6TBaPVPa0",
  authDomain: "jobportal123-25cae.firebaseapp.com",
  projectId: "jobportal123-25cae",
  storageBucket: "jobportal123-25cae.firebasestorage.app",
  messagingSenderId: "434704669042",
  appId: "1:434704669042:web:eaa17580554404b8b9a5eb",
  measurementId: "G-F1N55YN8CR"
};


        // 初始化 Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // 監聽登入狀態
        onAuthStateChanged(auth, (user) => {
            const loginBtn = document.getElementById('login-btn');
            const userInfo = document.getElementById('user-info');
            const userName = document.getElementById('user-name');
            const employerZone = document.getElementById('employer-zone');

            if (user) {
                loginBtn.classList.add('hidden');
                userInfo.classList.remove('hidden');
                userName.innerText = user.displayName;
                employerZone.classList.remove('hidden');
                console.log("登入成功:", user.email);
            } else {
                loginBtn.classList.remove('hidden');
                userInfo.classList.add('hidden');
                employerZone.classList.add('hidden');
            }
        });

        // 全局函式暴露
        window.handleGoogleLogin = async () => {
            try {
                await signInWithPopup(auth, provider);
                document.getElementById('login-modal').classList.add('hidden');
            } catch (error) {
                console.error("登入失敗:", error);
                // 這裡避免使用 alert，使用 console 紀錄錯誤
            }
        };

        window.handleLogout = () => signOut(auth);
    </script>

    <style>
        .job-card { transition: all 0.3s ease; }
        .job-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .modal-overlay { background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900">

    <nav class="bg-white shadow-sm px-6 py-4 sticky top-0 z-50 flex justify-between items-center">
        <h1 class="text-2xl font-black text-blue-600">JobPortal</h1>
        <div id="auth-section">
            <button onclick="document.getElementById('login-modal').classList.remove('hidden')" id="login-btn" class="bg-slate-900 text-white px-6 py-2 rounded-full font-bold text-sm">
                僱主登入
            </button>
            <div id="user-info" class="hidden flex items-center gap-4">
                <span id="user-name" class="text-sm font-bold"></span>
                <button onclick="handleLogout()" class="text-xs text-red-500 font-bold">登出</button>
            </div>
        </div>
    </nav>

    <header class="bg-slate-900 py-20 text-center text-white">
        <h2 class="text-4xl font-black mb-4">尋找您的理想職位</h2>
        <p class="text-slate-400">連動 Google 帳戶，開啟企業招募權限</p>
    </header>

    <main class="max-w-4xl mx-auto p-6 -mt-10">
        <div id="employer-zone" class="hidden bg-white p-8 rounded-3xl shadow-xl border-2 border-blue-100 mb-10">
            <h2 class="text-2xl font-black text-blue-600 mb-4">管理後台</h2>
            <p class="text-slate-500">您現在可以管理職位發佈。歡迎回來！</p>
        </div>

        <div class="grid gap-6">
            <div class="job-card bg-white p-6 rounded-2xl border border-slate-100">
                <h3 class="text-xl font-bold">資深設計師</h3>
                <p class="text-blue-600 mb-4">創意工作室</p>
                <button class="bg-slate-100 px-6 py-2 rounded-xl font-bold text-sm">查看詳情</button>
            </div>
        </div>
    </main>

    <!-- 登入彈窗 -->
    <div id="login-modal" class="fixed inset-0 modal-overlay z-[100] hidden flex items-center justify-center">
        <div class="bg-white p-10 rounded-[40px] shadow-2xl max-w-sm w-full text-center">
            <h3 class="text-2xl font-black mb-6">歡迎回來</h3>
            <button onclick="handleGoogleLogin()" class="w-full flex items-center justify-center gap-3 border-2 border-slate-100 py-4 rounded-2xl hover:bg-slate-50 transition font-bold">
                <img src="https://www.google.com/favicon.ico" class="w-5 h-5">
                使用 Google 登入
            </button>
            <button onclick="document.getElementById('login-modal').classList.add('hidden')" class="mt-4 text-slate-400 text-sm">取消</button>
        </div>
    </div>

</body>
</html>

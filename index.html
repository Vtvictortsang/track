<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卓越求職網 - 探索你的職業機會</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 Firebase SDK (模組化版本) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // --- 請將下方的配置替換為你在 Firebase Console 獲得的真實資料 ---
        const firebaseConfig = {
  apiKey: "AIzaSyBGQYGg1vet5xNc81xV-vLz3e6TBaPVPa0",
  authDomain: "jobportal123-25cae.firebaseapp.com",
  projectId: "jobportal123-25cae",
  storageBucket: "jobportal123-25cae.firebasestorage.app",
  messagingSenderId: "434704669042",
  appId: "1:434704669042:web:eaa17580554404b8b9a5eb",
  measurementId: "G-F1N55YN8CR"
};


        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // 定義管理員 Email (請修改為您的帳號)
        const ADMIN_EMAIL = "vt.victortsang@gmail.com"; 

        onAuthStateChanged(auth, (user) => {
            const loginBtn = document.getElementById('login-btn');
            const userInfo = document.getElementById('user-info');
            const userName = document.getElementById('user-name');
            const employerZone = document.getElementById('employer-zone');

            if (user) {
                loginBtn.classList.add('hidden');
                userInfo.classList.remove('hidden');
                userName.innerText = user.displayName;
                employerZone.classList.remove('hidden');
                
                // 檢查是否為管理員
                window.isAdmin = (user.email === ADMIN_EMAIL);
                
                renderJobs(); 
                renderApplicants(); 
            } else {
                loginBtn.classList.remove('hidden');
                userInfo.classList.add('hidden');
                employerZone.classList.add('hidden');
                window.isAdmin = false;
            }
        });

        window.handleGoogleLogin = async () => {
            try {
                await signInWithPopup(auth, provider);
                document.getElementById('login-modal').classList.add('hidden');
            } catch (error) {
                console.error("登入失敗:", error);
            }
        };

        window.handleLogout = () => signOut(auth);
    </script>

    <style>
        .job-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .job-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        .modal-overlay { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(8px); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.4s ease-out forwards; }
        .logo-preview { object-fit: cover; width: 64px; height: 64px; border-radius: 12px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

    <nav class="bg-white/80 backdrop-blur-md shadow-sm px-6 py-4 sticky top-0 z-50 flex justify-between items-center border-b border-slate-100">
        <div class="flex items-center gap-8">
            <h1 class="text-2xl font-black text-blue-600 tracking-tight">JobPortal</h1>
        </div>
        <div id="auth-section">
            <button onclick="document.getElementById('login-modal').classList.remove('hidden')" id="login-btn" class="bg-slate-900 text-white px-6 py-2 rounded-full hover:bg-blue-600 transition font-bold text-sm">
                僱主專區
            </button>
            <div id="user-info" class="hidden flex items-center gap-4">
                <div class="flex flex-col items-end">
                    <span class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">已登入</span>
                    <span id="user-name" class="text-sm font-bold text-slate-800"></span>
                </div>
                <button onclick="handleLogout()" class="p-2 hover:bg-red-50 rounded-full group transition">
                    <svg class="w-5 h-5 text-slate-400 group-hover:text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                </button>
            </div>
        </div>
    </nav>

    <header class="bg-slate-900 py-20 px-6 text-center text-white">
        <h2 class="text-4xl md:text-5xl font-black mb-6 leading-tight">尋找下一個職場舞台</h2>
        <p class="text-slate-400 text-lg max-w-2xl mx-auto mb-8 font-medium">企業招募與人才對接的首選平台</p>
    </header>

    <main class="max-w-6xl mx-auto p-6 -mt-10 relative z-20">
        
        <section class="mb-16">
            <div class="flex justify-between items-center mb-8 bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                <h3 class="text-xl font-black text-slate-800">最新招聘職位 (有效期 7 天)</h3>
            </div>
            <div id="visitor-job-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- 預設職位 -->
                <div class="job-card bg-white p-8 rounded-3xl border border-slate-100 shadow-sm flex flex-col h-full">
                    <div class="flex items-center gap-4 mb-6">
                        <div class="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center text-white font-bold text-xl">F</div>
                        <div>
                            <h3 class="font-black text-lg text-slate-800 leading-none">資深軟體工程師</h3>
                            <p class="text-blue-600 text-xs font-bold mt-1">未來科技集團</p>
                        </div>
                    </div>
                    <p class="text-slate-500 text-sm mb-6 flex-grow line-clamp-3 bg-slate-50 p-4 rounded-xl italic">負責公司核心產品的大規模分散式架構開發。</p>
                    <button onclick="openApplyModal('資深軟體工程師')" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-black hover:bg-blue-600 transition">立即應徵</button>
                </div>
            </div>
        </section>

        <div id="employer-zone" class="hidden space-y-10 border-t-2 border-slate-200 border-dashed pt-16 animate-fadeIn pb-20">
            <div class="bg-blue-600 rounded-3xl p-8 text-white flex flex-col md:flex-row md:items-center justify-between gap-6 shadow-2xl">
                <div>
                    <h2 class="text-3xl font-black text-white">僱主控制台</h2>
                    <p class="text-blue-100 font-medium">管理職位發布與品牌形象 (發布期為 7 天)</p>
                </div>
                <button onclick="togglePostForm()" class="bg-white text-blue-600 px-8 py-4 rounded-2xl font-black hover:bg-slate-100 transition">發布新職位</button>
            </div>
            
            <section id="post-form" class="hidden bg-white p-10 rounded-3xl shadow-xl border border-slate-100">
                <h3 class="text-xl font-black mb-8 border-b pb-4 text-slate-800">發布新職位詳情</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                    <div class="space-y-4">
                        <label class="text-sm font-black text-slate-500 uppercase ml-2">公司 LOGO</label>
                        <div onclick="document.getElementById('job-logo-input').click()" class="border-2 border-dashed border-slate-200 rounded-3xl h-48 flex flex-col items-center justify-center cursor-pointer hover:border-blue-400 hover:bg-blue-50 transition overflow-hidden bg-slate-50">
                            <img id="logo-preview-img" src="" class="hidden w-full h-full object-cover">
                            <div id="logo-placeholder" class="text-center p-4">
                                <svg class="w-10 h-10 text-slate-300 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                                <span class="text-xs font-bold text-slate-400">點擊上傳圖片</span>
                            </div>
                        </div>
                        <input type="file" id="job-logo-input" accept="image/*" class="hidden" onchange="previewLogo(this)">
                    </div>

                    <div class="md:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-4">
                            <input type="text" id="job-title" placeholder="職位名稱" class="w-full border-2 border-slate-50 p-4 rounded-2xl outline-none focus:border-blue-500 bg-slate-50 transition">
                            <input type="text" id="job-company" placeholder="公司名稱" class="w-full border-2 border-slate-50 p-4 rounded-2xl outline-none focus:border-blue-500 bg-slate-50 transition">
                            <input type="text" id="job-salary" placeholder="薪資待遇" class="w-full border-2 border-slate-50 p-4 rounded-2xl outline-none focus:border-blue-500 bg-slate-50 transition">
                            <input type="text" id="job-location" placeholder="地點" class="w-full border-2 border-slate-50 p-4 rounded-2xl outline-none focus:border-blue-500 bg-slate-50 transition">
                        </div>
                        <textarea id="job-desc" placeholder="詳細說明..." class="w-full border-2 border-slate-50 p-4 rounded-2xl outline-none focus:border-blue-500 bg-slate-50 transition min-h-[200px] resize-none"></textarea>
                        <button onclick="postJob()" class="bg-blue-600 text-white py-5 rounded-2xl font-black hover:bg-blue-700 transition md:col-span-2 shadow-lg shadow-blue-200 mt-2">確認並發布職位 (有效期 7 天)</button>
                    </div>
                </div>
            </section>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
                <div class="lg:col-span-2 space-y-6">
                    <h3 class="font-black text-slate-800 text-lg flex items-center gap-2">
                        <span class="w-2 h-6 bg-blue-600 rounded-full"></span> 您的發布清單
                    </h3>
                    <div id="employer-job-list" class="grid gap-4"></div>
                </div>
                <div class="space-y-6">
                    <h3 class="font-black text-slate-800 text-lg flex items-center gap-2">
                        <span class="w-2 h-6 bg-emerald-500 rounded-full"></span> 最新應徵
                    </h3>
                    <div id="applicant-list" class="space-y-4"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Modals -->
    <div id="login-modal" class="fixed inset-0 modal-overlay z-[100] hidden flex items-center justify-center p-6">
        <div class="bg-white rounded-[40px] p-10 max-w-md w-full shadow-2xl relative text-center">
            <button onclick="document.getElementById('login-modal').classList.add('hidden')" class="absolute top-8 right-8 text-slate-300 hover:text-slate-900 text-2xl font-light">&times;</button>
            <h3 class="text-3xl font-black mb-6 text-slate-800">僱主登入</h3>
            <button onclick="handleGoogleLogin()" class="w-full flex items-center justify-center gap-4 bg-slate-50 border-2 border-slate-100 py-4 rounded-2xl hover:bg-blue-50 transition font-black">
                <img src="https://www.google.com/favicon.ico" class="w-6 h-6">
                <span>使用 Google 登入</span>
            </button>
        </div>
    </div>

    <div id="apply-modal" class="fixed inset-0 modal-overlay z-[100] hidden flex items-center justify-center p-6">
        <div class="bg-white rounded-[40px] p-10 max-w-md w-full shadow-2xl animate-fadeIn">
            <h3 class="text-2xl font-black mb-1 text-slate-800">提交申請</h3>
            <p id="apply-job-title" class="text-blue-600 font-bold mb-6 text-blue-600"></p>
            <div class="space-y-4 text-slate-800">
                <input type="text" id="app-name" placeholder="您的姓名" class="w-full bg-slate-50 p-4 rounded-2xl outline-none border-2 border-transparent focus:border-blue-500 transition">
                <input type="tel" id="app-phone" placeholder="聯絡電話" class="w-full bg-slate-50 p-4 rounded-2xl outline-none border-2 border-transparent focus:border-blue-500 transition">
                <button onclick="submitApplication()" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-black hover:bg-blue-700 transition">確認提交</button>
                <button onclick="document.getElementById('apply-modal').classList.add('hidden')" class="w-full py-4 text-slate-400 font-bold">返回</button>
            </div>
        </div>
    </div>

    <script>
        let jobs = [];
        let currentLogoBase64 = "";
        let applicants = [
            { id: 1, name: "陳大文", phone: "91234567", job: "資深軟體工程師", time: "10 分鐘前" }
        ];

        function togglePostForm() { document.getElementById('post-form').classList.toggle('hidden'); }
        
        function previewLogo(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    currentLogoBase64 = e.target.result;
                    document.getElementById('logo-preview-img').src = currentLogoBase64;
                    document.getElementById('logo-preview-img').classList.remove('hidden');
                    document.getElementById('logo-placeholder').classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        }

        function openApplyModal(title) {
            document.getElementById('apply-job-title').innerText = title;
            document.getElementById('apply-modal').classList.remove('hidden');
        }

        // 管理員功能：延長 7 天
        window.extendJobTime = function(jobId) {
            const jobIndex = jobs.findIndex(j => j.id === jobId);
            if (jobIndex !== -1 && window.isAdmin) {
                const currentExpiry = jobs[jobIndex].expiryDate;
                // 在現有過期時間基礎上增加 7 天
                jobs[jobIndex].expiryDate = currentExpiry + (7 * 24 * 60 * 60 * 1000);
                renderJobs();
            }
        }

        function postJob() {
            const title = document.getElementById('job-title').value;
            const company = document.getElementById('job-company').value;
            const salary = document.getElementById('job-salary').value;
            const location = document.getElementById('job-location').value;
            const desc = document.getElementById('job-desc').value;

            if (!title || !company) return;

            const now = Date.now();
            const expiryDate = now + (7 * 24 * 60 * 60 * 1000); // 7 天後過期

            const newJob = { 
                id: now, 
                title, 
                company, 
                salary, 
                location,
                logo: currentLogoBase64,
                desc: desc || "未提供詳細描述",
                postDate: now,
                expiryDate: expiryDate
            };
            
            jobs.unshift(newJob);
            
            // 重置表單
            document.getElementById('job-title').value = '';
            document.getElementById('job-company').value = '';
            document.getElementById('job-salary').value = '';
            document.getElementById('job-location').value = '';
            document.getElementById('job-desc').value = '';
            document.getElementById('logo-preview-img').classList.add('hidden');
            document.getElementById('logo-placeholder').classList.remove('hidden');
            currentLogoBase64 = "";
            
            renderJobs();
            togglePostForm();
        }

        function submitApplication() {
            const name = document.getElementById('app-name').value;
            const phone = document.getElementById('app-phone').value;
            if(!name || !phone) return;
            applicants.unshift({ id: Date.now(), name, phone, job: document.getElementById('apply-job-title').innerText, time: "剛剛" });
            renderApplicants();
            document.getElementById('apply-modal').classList.add('hidden');
        }

        function renderJobs() {
            const visitorList = document.getElementById('visitor-job-list');
            const employerList = document.getElementById('employer-job-list');
            const now = Date.now();
            
            // 訪客列表：只顯示未過期的職位
            const activeJobs = jobs.filter(job => job.expiryDate > now);
            
            const html = activeJobs.map(job => `
                <div class="job-card bg-white p-8 rounded-3xl border border-slate-100 shadow-sm animate-fadeIn flex flex-col h-full">
                    <div class="flex items-center gap-4 mb-6">
                        ${job.logo ? `<img src="${job.logo}" class="w-12 h-12 rounded-xl object-cover">` : 
                        `<div class="w-12 h-12 bg-blue-100 text-blue-600 rounded-xl flex items-center justify-center font-black text-xl">${job.company.charAt(0)}</div>`}
                        <div class="overflow-hidden">
                            <h3 class="font-black text-lg text-slate-800 leading-tight truncate">${job.title}</h3>
                            <p class="text-blue-600 text-xs font-bold mt-1 truncate">${job.company}</p>
                        </div>
                    </div>
                    <div class="flex justify-between items-center text-[10px] font-black uppercase tracking-widest text-slate-400 mb-4">
                        <span>${job.location}</span>
                        <span class="text-blue-500">${job.salary}</span>
                    </div>
                    <p class="text-slate-500 text-sm mb-6 flex-grow line-clamp-3 bg-slate-50 p-4 rounded-xl italic">${job.desc}</p>
                    <button onclick="openApplyModal('${job.title}')" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-black hover:bg-blue-700 transition">立即應徵</button>
                </div>
            `).join('');

            visitorList.innerHTML = html + `
                <div class="job-card bg-white p-8 rounded-3xl border border-slate-100 shadow-sm flex flex-col h-full">
                    <div class="flex items-center gap-4 mb-6">
                        <div class="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center text-white font-bold text-xl">F</div>
                        <div><h3 class="font-black text-lg text-slate-800">資深軟體工程師</h3><p class="text-blue-600 text-xs font-bold mt-1">未來科技集團</p></div>
                    </div>
                    <p class="text-slate-500 text-sm mb-6 flex-grow line-clamp-3 bg-slate-50 p-4 rounded-xl italic">（系統範例）負責公司核心產品的大規模分散式架構開發。</p>
                    <button onclick="openApplyModal('資深軟體工程師')" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-black hover:bg-blue-600 transition">立即應徵</button>
                </div>
            `;

            // 僱主管理列表：顯示所有職位（含已過期），但顯示過期狀態與管理員編輯功能
            if(jobs.length > 0) {
                employerList.innerHTML = jobs.map(job => {
                    const isExpired = job.expiryDate <= now;
                    const expiryStr = new Date(job.expiryDate).toLocaleDateString();
                    return `
                    <div class="bg-white p-6 rounded-3xl border ${isExpired ? 'border-red-100 bg-red-50/30' : 'border-slate-100'} shadow-sm animate-fadeIn flex flex-col md:flex-row md:items-center gap-4">
                        <div class="flex items-center gap-4 flex-grow">
                            ${job.logo ? `<img src="${job.logo}" class="w-10 h-10 rounded-lg object-cover">` : `<div class="w-10 h-10 bg-slate-100 rounded-lg flex items-center justify-center text-slate-400 font-bold">${job.company.charAt(0)}</div>`}
                            <div>
                                <h4 class="font-black text-slate-800 text-sm">${job.title}</h4>
                                <p class="text-[10px] font-bold text-slate-400">${job.company} • 有效至: ${expiryStr}</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-3">
                            ${isExpired ? '<span class="text-red-500 font-black text-[10px]">已過期</span>' : '<span class="text-emerald-500 font-black text-[10px]">招募中</span>'}
                            ${window.isAdmin ? `
                                <button onclick="extendJobTime(${job.id})" class="text-[10px] bg-slate-900 text-white px-3 py-1.5 rounded-lg font-black hover:bg-blue-600 transition">
                                    延長 7 天
                                </button>
                            ` : ''}
                        </div>
                    </div>
                `}).join('');
            }
        }

        function renderApplicants() {
            const list = document.getElementById('applicant-list');
            list.innerHTML = applicants.map(a => `
                <div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm animate-fadeIn">
                    <div class="flex justify-between mb-2"><span class="font-black text-slate-800">${a.name}</span><span class="text-[10px] font-black text-slate-300 uppercase">${a.time}</span></div>
                    <div class="text-[10px] font-black text-blue-600 bg-blue-50 px-3 py-1 rounded-full w-fit mb-4">應徵：${a.job}</div>
                    <div class="text-sm font-bold text-slate-500">📞 ${a.phone}</div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>

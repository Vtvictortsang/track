    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
  apiKey: "AIzaSyBGQYGg1vet5xNc81xV-vLz3e6TBaPVPa0",
  authDomain: "jobportal123-25cae.firebaseapp.com",
  projectId: "jobportal123-25cae",
  storageBucket: "jobportal123-25cae.firebasestorage.app",
  messagingSenderId: "434704669042",
  appId: "1:434704669042:web:eaa17580554404b8b9a5eb",
  measurementId: "G-F1N55YN8CR"
};
        const ADMIN_EMAIL = "vt.victortsang@gmail.com"; 
        
        let auth = null;
        window.currentUser = null;
        window.isAdmin = false;

        const isFirebaseEnabled = firebaseConfig.apiKey && firebaseConfig.apiKey !== "";

        if (isFirebaseEnabled) {
            try {
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                const provider = new GoogleAuthProvider();

                onAuthStateChanged(auth, (user) => {
                    window.currentUser = user;
                    window.isAdmin = user && user.email === ADMIN_EMAIL;
                    updateAuthUI(user);
                });

                window.handleGoogleLogin = async () => {
                    try {
                        const result = await signInWithPopup(auth, provider);
                        window.currentUser = result.user;
                        window.isAdmin = result.user.email === ADMIN_EMAIL;
                        document.getElementById('login-modal').classList.add('hidden');
                    } catch (error) { console.error("登入失敗:", error); }
                };

                window.handleLogout = () => signOut(auth);
            } catch (e) { setupDemoMode(); }
        } else { setupDemoMode(); }

        function setupDemoMode() {
            window.handleGoogleLogin = (role) => {
                if (role === 'admin') {
                    window.currentUser = { uid: "admin_001", displayName: "系統管理員", email: ADMIN_EMAIL };
                    window.isAdmin = true;
                } else {
                    window.currentUser = { uid: "employer_" + Math.floor(Math.random()*1000), displayName: "普通僱主", email: "employer@test.com" };
                    window.isAdmin = false;
                }
                updateAuthUI(window.currentUser);
                document.getElementById('login-modal').classList.add('hidden');
            };
            window.handleLogout = () => {
                window.currentUser = null;
                window.isAdmin = false;
                updateAuthUI(null);
            };
            setTimeout(() => updateAuthUI(null), 100);
        }

        function updateAuthUI(user) {
            const loginBtn = document.getElementById('login-btn');
            const userInfo = document.getElementById('user-info');
            const userName = document.getElementById('user-name');
            const employerZone = document.getElementById('employer-zone');
            const adminBadge = document.getElementById('admin-badge');
            const adminAdPanel = document.getElementById('admin-ad-panel');

            if (user) {
                if (loginBtn) loginBtn.classList.add('hidden');
                if (userInfo) userInfo.classList.remove('hidden');
                if (userName) userName.innerText = user.displayName;
                if (employerZone) employerZone.classList.remove('hidden');
                if (adminBadge) adminBadge.classList.toggle('hidden', !window.isAdmin);
                if (adminAdPanel) adminAdPanel.classList.toggle('hidden', !window.isAdmin);
                
                renderJobs(); 
                renderApplicants(); 
                renderAdManager();
            } else {
                if (loginBtn) loginBtn.classList.remove('hidden');
                if (userInfo) userInfo.classList.add('hidden');
                if (employerZone) employerZone.classList.add('hidden');
                if (adminBadge) adminBadge.classList.add('hidden');
                if (adminAdPanel) adminAdPanel.classList.add('hidden');
                renderJobs(); 
            }
        }
    </script>

        .job-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        .job-card.pinned { border: 1.5px solid #fbbf24; background: #fffbeb; }

        @keyframes slideIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        .sidebar-btn.active { @apply bg-blue-600 text-white shadow-md; }

    </style>
</head>

    <script>
        // 更新模擬數據以符合新的類別
        let jobs = [
            {id: 1, ownerId: "admin_001", title: "高級保安主管", company: "Secure HK", salary: "HK$ 22k-28k", location: "中環", type: "全職", cat: "保安", desc: "負責商業大廈保安管理。", logo: "", isPinned: true},
            {id: 2, ownerId: "admin_001", title: "西餐副主廚", company: "Le Bistro", salary: "HK$ 25k-30k", location: "尖沙咀", type: "全職", cat: "飲食", desc: "具有5年西餐經驗。", logo: "", isPinned: false},
            {id: 3, ownerId: "admin_001", title: "註冊護士 (兼職)", company: "Care Plus", salary: "HK$ 350/hr", location: "旺角", type: "兼職", cat: "醫護", desc: "支援日間護理中心。", logo: "", isPinned: false},
            {id: 4, ownerId: "admin_001", title: "電梯維修技工", company: "Lift Tech", salary: "HK$ 20k-35k", location: "觀塘", type: "全職", cat: "維修", desc: "需持有相關技工證書。", logo: "", isPinned: false},
            {id: 5, ownerId: "admin_001", title: "跨境物流司機", company: "Global Trans", salary: "HK$ 28k", location: "葵涌", type: "全職", cat: "運輸", desc: "需持有中港牌照。", logo: "", isPinned: false},
            {id: 6, ownerId: "admin_001", title: "酒店禮賓員", company: "Grand Plaza", salary: "HK$ 18k", location: "灣仔", type: "全職", cat: "酒店", desc: "提供五星級客戶服務。", logo: "", isPinned: false}
        ];
        
        let applicants = [];
        let ads = [];
        let activeFilters = { type: 'all', category: 'all' };
        let currentLogoBase64 = "";
        let currentAdBase64 = "";
        let adIndex = 0;

        function updateCounts() {
            // 更新類型數量
            document.getElementById('cnt-type-all').innerText = jobs.length;
            document.getElementById('cnt-type-全職').innerText = jobs.filter(j => j.type === '全職').length;
            document.getElementById('cnt-type-兼職').innerText = jobs.filter(j => j.type === '兼職').length;
            
            // 更新類別數量
            const categories = ['保安', '飲食', '維修', '醫護', '運輸', '客戶服務', '酒店', '會所'];
            categories.forEach(cat => {
                const badge = document.getElementById(`cnt-cat-${cat}`);
                if (badge) badge.innerText = jobs.filter(j => j.cat === cat).length;
            });
        }

        function setFilter(dim, value) {
            activeFilters[dim] = value;
            const prefix = dim === 'type' ? 'filter-type-' : 'filter-cat-';
            const btns = document.querySelectorAll(`[id^="${prefix}"]`);
            btns.forEach(btn => btn.classList.remove('active'));
            
            const activeBtnId = dim === 'type' ? (value === 'all' ? 'filter-type-all' : `filter-type-${value}`) : (value === 'all' ? 'filter-cat-all' : `filter-cat-${value}`);
            const target = document.getElementById(activeBtnId);
            if (target) target.classList.add('active');
            
            renderJobs();
        }

        function resetFilters() {
            activeFilters = { type: 'all', category: 'all' };
            setFilter('type', 'all');
            setFilter('category', 'all');
        }

        // Ad Management
        function openAdForm() {
            if (ads.length >= 5) return alert("最多只能發布 5 個廣告項目");
            document.getElementById('ad-form-modal').classList.remove('hidden');
        }

        function closeAdForm() {
            document.getElementById('ad-form-modal').classList.add('hidden');
            document.getElementById('ad-img-input').value = '';
            document.getElementById('ad-link').value = '';
            document.getElementById('ad-preview-box').classList.add('hidden');
            currentAdBase64 = "";
        }

        function previewAdImage(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    currentAdBase64 = e.target.result;
                    document.getElementById('ad-preview-img').src = currentAdBase64;
                    document.getElementById('ad-preview-box').classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        }

        function saveAd() {
            if (!currentAdBase64) return alert("請上傳圖片");
            ads.push({ id: Date.now(), image: currentAdBase64, link: document.getElementById('ad-link').value || "#" });
            closeAdForm();
            renderAdManager();
            renderAdBanner();
        }

        function deleteAd(id) {
            ads = ads.filter(a => a.id !== id);
            renderAdManager();
            renderAdBanner();
        }

        function renderAdManager() {
            const list = document.getElementById('ad-admin-list');
            if (!list || !window.isAdmin) return;
            document.getElementById('add-ad-btn').disabled = ads.length >= 5;
            list.innerHTML = ads.map(ad => `
                <div class="bg-white p-2 rounded-xl border border-amber-200 flex items-center justify-between">
                    <img src="${ad.image}" class="w-10 h-10 object-cover rounded-lg">
                    <button onclick="deleteAd(${ad.id})" class="text-red-400 p-2"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-width="2"></path></svg></button>
                </div>
            `).join('');
        }

        function renderAdBanner() {
            const banner = document.getElementById('ad-banner');
            const container = document.getElementById('ad-container');
            const dots = document.getElementById('ad-dots');
            if (ads.length === 0) { banner.classList.add('hidden'); return; }
            banner.classList.remove('hidden');
            container.innerHTML = ads.map((ad, idx) => `<a href="${ad.link}" target="_blank" class="ad-slide w-full h-full ${idx === 0 ? 'active' : ''}"><img src="${ad.image}" class="w-full h-full object-cover"></a>`).join('');
            dots.innerHTML = ads.map((_, idx) => `<div class="w-1.5 h-1.5 rounded-full ${idx === 0 ? 'bg-white scale-125' : 'bg-white/40'}"></div>`).join('');
            adIndex = 0;
        }

        setInterval(() => {
            if (ads.length <= 1) return;
            const slides = document.querySelectorAll('.ad-slide');
            const dots = document.getElementById('ad-dots').children;
            if (!slides[adIndex]) return;
            slides[adIndex].classList.remove('active');
            dots[adIndex].classList.replace('bg-white', 'bg-white/40');
            dots[adIndex].classList.remove('scale-125');
            adIndex = (adIndex + 1) % ads.length;
            slides[adIndex].classList.add('active');
            dots[adIndex].classList.replace('bg-white/40', 'bg-white');
            dots[adIndex].classList.add('scale-125');
        }, 5000);

        // Jobs Rendering
        function renderJobs() {
            const list = document.getElementById('visitor-job-list');
            if (!list) return;

            let filtered = jobs.filter(j => {
                const typeMatch = activeFilters.type === 'all' || j.type === activeFilters.type;
                const catMatch = activeFilters.category === 'all' || j.cat === activeFilters.category;
                return typeMatch && catMatch;
            });

            const sortedJobs = filtered.sort((a, b) => b.isPinned - a.isPinned || b.id - a.id).slice(0, 15);
            document.getElementById('job-count').innerText = filtered.length;

            list.innerHTML = sortedJobs.length === 0 ? `<div class="col-span-full py-12 text-center text-slate-300 font-bold">沒有符合搜尋條件的職位</div>` : sortedJobs.map(job => `
                <div class="job-card bg-white p-4 rounded-3xl border border-slate-100 flex flex-col h-full ${job.isPinned ? 'pinned' : ''}">
                    <div class="flex items-start justify-between mb-3">
                        ${job.logo ? `<img src="${job.logo}" class="w-10 h-10 rounded-xl object-cover">` : `<div class="w-10 h-10 bg-slate-50 flex items-center justify-center font-black text-slate-300 rounded-xl text-xs">${job.company[0]}</div>`}
                        <div class="flex flex-col items-end gap-1">
                            <span class="text-[9px] font-black px-2 py-0.5 rounded-full ${job.type === '全職' ? 'bg-blue-50 text-blue-500' : 'bg-green-50 text-green-500'}">${job.type}</span>
                            <span class="text-[9px] font-bold text-slate-400">${job.location}</span>
                        </div>
                    </div>
                    <div class="mb-3">
                        <h3 class="text-xs font-black text-slate-800 leading-tight line-clamp-1 mb-0.5">${job.title}</h3>
                        <p class="text-[9px] text-slate-400 font-bold uppercase truncate">${job.company} • ${job.cat}</p>
                    </div>
                    <div class="mb-4">
                        <span class="text-[10px] font-black text-blue-600">${job.salary}</span>
                    </div>
                    <button onclick="openApplyModal(${job.id})" class="mt-auto w-full py-2 bg-slate-900 text-white rounded-xl text-[10px] font-black hover:bg-blue-600 transition">立即申請</button>
                </div>
            `).join('');

            updateCounts();
            renderEmployerJobs();
        }

        function renderEmployerJobs() {
            const list = document.getElementById('employer-job-list');
            if (!list || !window.currentUser) return;
            const myJobs = window.isAdmin ? jobs : jobs.filter(j => j.ownerId === window.currentUser.uid);
            list.innerHTML = `<h3 class="font-black text-sm mb-4">管理我的職位 (${myJobs.length})</h3>` + myJobs.map(job => `
                <div class="bg-white p-4 rounded-2xl border border-slate-100 flex items-center justify-between">
                    <div>
                        <div class="font-bold text-sm">${job.title}</div>
                        <div class="text-[10px] text-slate-400 uppercase">${job.company} • ${job.cat}</div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="deleteJob(${job.id})" class="text-red-400 p-2"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7" stroke-width="2"></path></svg></button>
                    </div>
                </div>
            `).join('');
        }

        function renderApplicants() {
            const list = document.getElementById('applicant-list');
            if(!list || !window.currentUser) return;
            const myApps = window.isAdmin ? applicants : applicants.filter(a => a.jobOwnerId === window.currentUser.uid);
            list.innerHTML = `<h3 class="font-black text-sm mb-4">收到申請 (${myApps.length})</h3>` + (myApps.length === 0 ? `<div class="p-6 text-center text-slate-300 text-xs">暫無資料</div>` : myApps.map(a => `
                <div class="bg-white p-4 rounded-2xl border border-slate-100">
                    <div class="flex justify-between font-bold text-xs mb-1"><span>${a.name}</span><span class="text-slate-300">${a.time}</span></div>
                    <div class="text-[10px] text-blue-600 mb-2">應徵：${a.jobTitle} (📞 ${a.phone})</div>
                    <div class="text-[10px] text-slate-500 italic bg-slate-50 p-2 rounded-lg">${a.experience || '無經驗描述'}</div>
                </div>
            `).join(''));
        }

        function togglePostForm() { document.getElementById('post-form').classList.toggle('hidden'); }

        function previewLogo(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => { currentLogoBase64 = e.target.result; };
                reader.readAsDataURL(file);
            }
        }

        function saveJob() {
            const title = document.getElementById('job-title').value;
            const company = document.getElementById('job-company').value;
            const type = document.getElementById('job-type').value;
            const cat = document.getElementById('job-cat').value;
            const salary = document.getElementById('job-salary').value;
            const location = document.getElementById('job-location').value;
            const desc = document.getElementById('job-desc').value;

            if (!title || !company) return alert("請填寫必填項");

            jobs.unshift({
                id: Date.now(),
                ownerId: window.currentUser.uid,
                title, company, type, cat, salary, location, desc,
                logo: currentLogoBase64,
                isPinned: false
            });
            
            togglePostForm();
            renderJobs();
        }

        window.deleteJob = (id) => {
            jobs = jobs.filter(j => j.id !== id);
            renderJobs();
        };

        window.openApplyModal = (id) => {
            const job = jobs.find(j => j.id === id);
            window.currentJobToApply = job;
            document.getElementById('apply-job-name').innerText = `${job.title} @ ${job.company}`;
            document.getElementById('apply-modal').classList.remove('hidden');
        };

        window.closeApplyModal = () => document.getElementById('apply-modal').classList.add('hidden');

        window.submitApplication = () => {
            const name = document.getElementById('apply-name').value;
            const phone = document.getElementById('apply-phone').value;
            if(!name || !phone) return alert("姓名與電話為必填");
            applicants.unshift({
                name, phone, experience: document.getElementById('apply-exp').value,
                jobTitle: window.currentJobToApply.title,
                jobOwnerId: window.currentJobToApply.ownerId,
                time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
            });
            renderApplicants();
            closeApplyModal();
        };

        window.onload = () => { renderJobs(); renderAdBanner(); };
    </script>
</body>
</html>

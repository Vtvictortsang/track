<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卓越求職網 - 廣告與權限管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

       const firebaseConfig = {
  apiKey: "AIzaSyBGQYGg1vet5xNc81xV-vLz3e6TBaPVPa0",
  authDomain: "jobportal123-25cae.firebaseapp.com",
  projectId: "jobportal123-25cae",
  storageBucket: "jobportal123-25cae.firebasestorage.app",
  messagingSenderId: "434704669042",
  appId: "1:434704669042:web:eaa17580554404b8b9a5eb",
  measurementId: "G-F1N55YN8CR"
};
        const ADMIN_EMAIL = "vt.victortsang@gmail.com"; 
        
        let auth = null;
        window.currentUser = null;
        window.isAdmin = false;

        const isFirebaseEnabled = firebaseConfig.apiKey && firebaseConfig.apiKey !== "";

        if (isFirebaseEnabled) {
            try {
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                const provider = new GoogleAuthProvider();

                onAuthStateChanged(auth, (user) => {
                    window.currentUser = user;
                    window.isAdmin = user && user.email === ADMIN_EMAIL;
                    updateAuthUI(user);
                });

                window.handleGoogleLogin = async () => {
                    try {
                        const result = await signInWithPopup(auth, provider);
                        window.currentUser = result.user;
                        window.isAdmin = result.user.email === ADMIN_EMAIL;
                        document.getElementById('login-modal').classList.add('hidden');
                    } catch (error) { console.error("登入失敗:", error); }
                };

                window.handleLogout = () => signOut(auth);
            } catch (e) { setupDemoMode(); }
        } else { setupDemoMode(); }

        function setupDemoMode() {
            window.handleGoogleLogin = (role) => {
                if (role === 'admin') {
                    window.currentUser = { uid: "admin_001", displayName: "系統管理員", email: ADMIN_EMAIL };
                    window.isAdmin = true;
                } else {
                    window.currentUser = { uid: "employer_" + Math.floor(Math.random()*1000), displayName: "普通僱主", email: "employer@test.com" };
                    window.isAdmin = false;
                }
                updateAuthUI(window.currentUser);
                document.getElementById('login-modal').classList.add('hidden');
            };
            window.handleLogout = () => {
                window.currentUser = null;
                window.isAdmin = false;
                updateAuthUI(null);
            };
            setTimeout(() => updateAuthUI(null), 100);
        }

        function updateAuthUI(user) {
            const loginBtn = document.getElementById('login-btn');
            const userInfo = document.getElementById('user-info');
            const userName = document.getElementById('user-name');
            const employerZone = document.getElementById('employer-zone');
            const adminBadge = document.getElementById('admin-badge');
            const adminAdPanel = document.getElementById('admin-ad-panel');

            if (user) {
                if (loginBtn) loginBtn.classList.add('hidden');
                if (userInfo) userInfo.classList.remove('hidden');
                if (userName) userName.innerText = user.displayName;
                if (employerZone) employerZone.classList.remove('hidden');
                if (adminBadge) adminBadge.classList.toggle('hidden', !window.isAdmin);
                if (adminAdPanel) adminAdPanel.classList.toggle('hidden', !window.isAdmin);
                
                renderJobs(); 
                renderApplicants(); 
                renderAdManager();
            } else {
                if (loginBtn) loginBtn.classList.remove('hidden');
                if (userInfo) userInfo.classList.add('hidden');
                if (employerZone) employerZone.classList.add('hidden');
                if (adminBadge) adminBadge.classList.add('hidden');
                if (adminAdPanel) adminAdPanel.classList.add('hidden');
            }
        }
    </script>

    <style>
        .job-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .job-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        .job-card.pinned { border: 2px solid #fbbf24; background: linear-gradient(to bottom right, #fff, #fffbeb); }
        .modal-overlay { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(8px); }
        .ad-slide { display: none; }
        .ad-slide.active { display: block; animation: slideIn 0.5s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

    <nav class="bg-white/80 backdrop-blur-md shadow-sm px-6 py-4 sticky top-0 z-50 flex justify-between items-center border-b border-slate-100">
        <div class="flex items-center gap-8">
            <h1 class="text-2xl font-black text-blue-600 tracking-tight">JobPortal</h1>
            <span id="admin-badge" class="hidden bg-amber-100 text-amber-700 text-[10px] px-3 py-1 rounded-full font-black uppercase tracking-widest border border-amber-200">系統管理員</span>
        </div>
        <div id="auth-section">
            <button onclick="document.getElementById('login-modal').classList.remove('hidden')" id="login-btn" class="bg-slate-900 text-white px-6 py-2 rounded-full hover:bg-blue-600 transition font-bold text-sm">登入入口</button>
            <div id="user-info" class="hidden flex items-center gap-4">
                <div class="flex flex-col items-end">
                    <span id="user-name" class="text-sm font-bold text-slate-800"></span>
                </div>
                <button onclick="handleLogout()" class="p-2 hover:bg-red-50 rounded-full transition text-slate-400"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg></button>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-6 mt-6">
        
        <!-- 頂部廣告位 (輪播) -->
        <section id="ad-banner" class="mb-12 relative h-48 md:h-64 rounded-[40px] overflow-hidden bg-slate-200 shadow-lg hidden">
            <div id="ad-container" class="w-full h-full"></div>
            <div id="ad-dots" class="absolute bottom-4 left-1/2 -translate-x-1/2 flex gap-2"></div>
        </section>

        <!-- 訪客視圖：所有人可見 -->
        <section class="mb-16">
            <div class="flex justify-between items-center mb-8 bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                <h3 class="text-xl font-black text-slate-800 tracking-tight">最新招聘職位</h3>
                <span class="text-xs text-slate-400 font-bold">目前共有 <span id="job-count">0</span> 個職位</span>
            </div>
            <div id="visitor-job-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </section>

        <!-- 僱主/管理員私有區域 -->
        <div id="employer-zone" class="hidden space-y-10 border-t-2 border-slate-200 border-dashed pt-16 pb-20">
            
            <!-- 管理員廣告管理區塊 -->
            <section id="admin-ad-panel" class="hidden bg-amber-50 p-8 rounded-[40px] border-2 border-amber-100">
                <div class="flex justify-between items-center mb-6">
                    <div>
                        <h3 class="text-xl font-black text-amber-800">廣告輪播管理</h3>
                        <p class="text-xs text-amber-600 font-bold">上限 5 個項目，顯示在職位列表上方</p>
                    </div>
                    <button onclick="openAdForm()" id="add-ad-btn" class="bg-amber-600 text-white px-6 py-2 rounded-2xl font-bold hover:bg-amber-700 transition shadow-md">新增廣告項目</button>
                </div>
                
                <div id="ad-form" class="hidden bg-white p-6 rounded-3xl shadow-inner border border-amber-200 mb-8 space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="space-y-2">
                            <label class="text-xs font-black text-slate-400 uppercase ml-2">廣告圖片 (建議 1200x400)</label>
                            <input type="file" id="ad-img-input" accept="image/*" class="w-full text-xs" onchange="previewAdImage(this)">
                            <div id="ad-preview-box" class="h-24 bg-slate-100 rounded-xl mt-2 overflow-hidden hidden">
                                <img id="ad-preview-img" src="" class="w-full h-full object-cover">
                            </div>
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-black text-slate-400 uppercase ml-2">跳轉連結 (URL)</label>
                            <input type="text" id="ad-link" placeholder="https://..." class="w-full bg-slate-50 p-3 rounded-xl border border-slate-100 outline-none focus:border-amber-400">
                            <div class="flex gap-2 pt-2">
                                <button onclick="saveAd()" class="flex-grow bg-amber-600 text-white py-3 rounded-xl font-bold">確認保存</button>
                                <button onclick="closeAdForm()" class="px-4 bg-slate-100 text-slate-400 rounded-xl font-bold">取消</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="ad-admin-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    <!-- 廣告管理卡片 -->
                </div>
            </section>

            <div class="bg-slate-900 rounded-[40px] p-8 text-white flex flex-col md:flex-row md:items-center justify-between gap-6 shadow-2xl">
                <div>
                    <h2 class="text-3xl font-black">工作管理台</h2>
                    <p class="text-slate-400 font-medium">管理職位發布與應徵申請</p>
                </div>
                <button onclick="togglePostForm()" class="bg-blue-600 text-white px-10 py-4 rounded-3xl font-black hover:bg-blue-700 transition shadow-xl">發布新職位</button>
            </div>
            
            <section id="post-form" class="hidden bg-white p-10 rounded-[40px] shadow-xl border border-slate-100">
                <h3 id="form-title" class="text-xl font-black mb-8 text-slate-800">職位發布詳細資料</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                    <div class="space-y-4">
                        <div onclick="document.getElementById('job-logo-input').click()" class="border-2 border-dashed border-slate-200 rounded-3xl h-48 flex flex-col items-center justify-center cursor-pointer hover:border-blue-400 hover:bg-blue-50 transition overflow-hidden bg-slate-50">
                            <img id="logo-preview-img" src="" class="hidden w-full h-full object-cover">
                            <div id="logo-placeholder" class="text-center p-4 text-slate-300">
                                <svg class="w-10 h-10 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" stroke-width="2"></path></svg>
                                <span class="text-xs font-bold uppercase">上傳公司 Logo</span>
                            </div>
                        </div>
                        <input type="file" id="job-logo-input" accept="image/*" class="hidden" onchange="previewLogo(this)">
                    </div>
                    <div class="md:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input type="hidden" id="edit-job-id">
                        <input type="text" id="job-title" placeholder="職位名稱" class="bg-slate-50 p-4 rounded-2xl border-2 border-transparent focus:border-blue-500 outline-none">
                        <input type="text" id="job-company" placeholder="公司名稱" class="bg-slate-50 p-4 rounded-2xl border-2 border-transparent focus:border-blue-500 outline-none">
                        <input type="text" id="job-salary" placeholder="薪資 (例: 25k-30k)" class="bg-slate-50 p-4 rounded-2xl border-2 border-transparent focus:border-blue-500 outline-none">
                        <input type="text" id="job-location" placeholder="地點" class="bg-slate-50 p-4 rounded-2xl border-2 border-transparent focus:border-blue-500 outline-none">
                        <textarea id="job-desc" placeholder="職位詳細描述..." class="bg-slate-50 p-4 rounded-2xl border-2 border-transparent focus:border-blue-500 min-h-[150px] md:col-span-2 outline-none"></textarea>
                        <button onclick="saveJob()" class="bg-blue-600 text-white py-4 rounded-2xl font-black hover:bg-blue-700 transition md:col-span-2">確認發布</button>
                    </div>
                </div>
            </section>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
                <div class="lg:col-span-2 space-y-6">
                    <h3 class="font-black text-slate-800 text-lg flex items-center gap-2">我的招聘列表 <span class="text-xs bg-white border border-slate-200 text-slate-400 px-3 py-1 rounded-full" id="my-job-count">0</span></h3>
                    <div id="employer-job-list" class="space-y-4"></div>
                </div>
                <div class="space-y-6">
                    <h3 class="font-black text-slate-800 text-lg">應徵者管理</h3>
                    <div id="applicant-list" class="space-y-4"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- 應徵 Modal -->
    <div id="apply-modal" class="fixed inset-0 modal-overlay z-[200] hidden flex items-center justify-center p-6">
        <div class="bg-white rounded-[40px] p-10 max-w-lg w-full shadow-2xl">
            <h3 class="text-2xl font-black text-slate-800 mb-1">提交申請</h3>
            <p id="apply-job-name" class="text-blue-600 font-bold mb-8 text-sm uppercase"></p>
            <div class="space-y-4">
                <input type="text" id="apply-name" placeholder="您的姓名" class="w-full bg-slate-50 p-4 rounded-2xl outline-none border-2 border-transparent focus:border-blue-500">
                <input type="text" id="apply-phone" placeholder="WhatsApp / 電話" class="w-full bg-slate-50 p-4 rounded-2xl outline-none border-2 border-transparent focus:border-blue-500">
                <textarea id="apply-exp" placeholder="簡述您的經驗..." class="w-full bg-slate-50 p-4 rounded-2xl outline-none border-2 border-transparent focus:border-blue-500 h-32"></textarea>
                <div class="flex gap-4 pt-4">
                    <button onclick="closeApplyModal()" class="flex-1 font-bold text-slate-400">取消</button>
                    <button onclick="submitApplication()" class="flex-[2] bg-blue-600 text-white py-4 rounded-2xl font-black">發送申請</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 登入入口 -->
    <div id="login-modal" class="fixed inset-0 modal-overlay z-[100] hidden flex items-center justify-center p-6">
        <div class="bg-white rounded-[40px] p-10 max-w-md w-full text-center">
            <h3 class="text-3xl font-black mb-1 text-slate-800">歡迎登入</h3>
            <p class="text-slate-400 mb-8 font-medium">請選擇您的身份進入系統</p>
            <div class="space-y-4">
                <button onclick="handleGoogleLogin('employer')" class="w-full bg-slate-50 flex items-center justify-between p-6 rounded-3xl border-2 border-transparent hover:border-blue-500 transition group text-left">
                    <div>
                        <div class="font-black text-slate-800">普通僱主</div>
                        <div class="text-[10px] text-slate-400 uppercase tracking-widest font-bold">管理個人招聘</div>
                    </div>
                    <span class="text-2xl">🏢</span>
                </button>
                <button onclick="handleGoogleLogin('admin')" class="w-full bg-slate-50 flex items-center justify-between p-6 rounded-3xl border-2 border-transparent hover:border-amber-500 transition group text-left">
                    <div>
                        <div class="font-black text-slate-800 text-amber-600">系統管理員</div>
                        <div class="text-[10px] text-slate-400 uppercase tracking-widest font-bold">全域管控權限</div>
                    </div>
                    <span class="text-2xl">🔑</span>
                </button>
            </div>
            <button onclick="document.getElementById('login-modal').classList.add('hidden')" class="mt-8 text-slate-300 font-bold text-sm">稍後再說</button>
        </div>
    </div>

    <script>
        let jobs = [{id: 1, ownerId: "admin_001", title: "高級產品經理", company: "Tech Flow Ltd.", salary: "HK$ 45k-60k", location: "觀塘", desc: "負責數位產品開發與市場策略協調。", logo: "", expiryDate: Date.now() + 604800000, isPinned: true}];
        let applicants = [];
        let ads = []; // 廣告數據: {id, image, link}
        let currentLogoBase64 = "";
        let currentAdBase64 = "";
        let adIndex = 0;

        // 廣告管理邏輯
        function openAdForm() {
            if (ads.length >= 5) return alert("最多只能發布 5 個廣告項目，請先刪除舊廣告");
            document.getElementById('ad-form').classList.remove('hidden');
        }

        function closeAdForm() {
            document.getElementById('ad-form').classList.add('hidden');
            document.getElementById('ad-img-input').value = '';
            document.getElementById('ad-link').value = '';
            document.getElementById('ad-preview-box').classList.add('hidden');
            currentAdBase64 = "";
        }

        function previewAdImage(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    currentAdBase64 = e.target.result;
                    document.getElementById('ad-preview-img').src = currentAdBase64;
                    document.getElementById('ad-preview-box').classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        }

        function saveAd() {
            const link = document.getElementById('ad-link').value;
            if (!currentAdBase64) return alert("請上傳廣告圖片");
            
            ads.push({ id: Date.now(), image: currentAdBase64, link: link || "#" });
            closeAdForm();
            renderAdManager();
            renderAdBanner();
        }

        function deleteAd(id) {
            ads = ads.filter(a => a.id !== id);
            renderAdManager();
            renderAdBanner();
        }

        function renderAdManager() {
            const list = document.getElementById('ad-admin-list');
            if (!list || !window.isAdmin) return;
            
            document.getElementById('add-ad-btn').disabled = ads.length >= 5;
            document.getElementById('add-ad-btn').classList.toggle('opacity-50', ads.length >= 5);

            list.innerHTML = ads.map(ad => `
                <div class="bg-white p-3 rounded-2xl border border-amber-200 shadow-sm relative overflow-hidden group">
                    <img src="${ad.image}" class="w-full h-24 object-cover rounded-xl mb-2">
                    <div class="flex justify-between items-center px-1">
                        <span class="text-[10px] text-slate-400 truncate max-w-[120px] font-bold">${ad.link}</span>
                        <button onclick="deleteAd(${ad.id})" class="text-red-500 hover:bg-red-50 p-1.5 rounded-lg transition"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-width="2"></path></svg></button>
                    </div>
                </div>
            `).join('');
        }

        function renderAdBanner() {
            const banner = document.getElementById('ad-banner');
            const container = document.getElementById('ad-container');
            const dots = document.getElementById('ad-dots');
            
            if (ads.length === 0) {
                banner.classList.add('hidden');
                return;
            }
            
            banner.classList.remove('hidden');
            container.innerHTML = ads.map((ad, idx) => `
                <a href="${ad.link}" target="_blank" class="ad-slide w-full h-full ${idx === 0 ? 'active' : ''}">
                    <img src="${ad.image}" class="w-full h-full object-cover">
                </a>
            `).join('');

            dots.innerHTML = ads.map((_, idx) => `
                <div class="w-2 h-2 rounded-full transition-all ${idx === 0 ? 'bg-white scale-125' : 'bg-white/40'}"></div>
            `).join('');

            adIndex = 0;
        }

        // 廣告輪播計時器
        setInterval(() => {
            if (ads.length <= 1) return;
            const slides = document.querySelectorAll('.ad-slide');
            const dots = document.getElementById('ad-dots').children;
            
            slides[adIndex].classList.remove('active');
            dots[adIndex].classList.remove('bg-white', 'scale-125');
            dots[adIndex].classList.add('bg-white/40');
            
            adIndex = (adIndex + 1) % ads.length;
            
            slides[adIndex].classList.add('active');
            dots[adIndex].classList.add('bg-white', 'scale-125');
            dots[adIndex].classList.remove('bg-white/40');
        }, 5000);

        // 原有職位管理邏輯 (保持隔離)
        function togglePostForm() {
            const form = document.getElementById('post-form');
            form.classList.toggle('hidden');
            if(form.classList.contains('hidden')) resetForm();
        }

        function previewLogo(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    currentLogoBase64 = e.target.result;
                    const preview = document.getElementById('logo-preview-img');
                    preview.src = currentLogoBase64;
                    preview.classList.remove('hidden');
                    document.getElementById('logo-placeholder').classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        }

        function resetForm() {
            document.getElementById('edit-job-id').value = '';
            document.getElementById('job-title').value = '';
            document.getElementById('job-company').value = '';
            document.getElementById('job-salary').value = '';
            document.getElementById('job-location').value = '';
            document.getElementById('job-desc').value = '';
            document.getElementById('logo-preview-img').classList.add('hidden');
            document.getElementById('logo-placeholder').classList.remove('hidden');
            currentLogoBase64 = "";
        }

        function saveJob() {
            if (!window.currentUser) return;
            const id = document.getElementById('edit-job-id').value;
            const title = document.getElementById('job-title').value;
            const company = document.getElementById('job-company').value;
            const salary = document.getElementById('job-salary').value;
            const location = document.getElementById('job-location').value;
            const desc = document.getElementById('job-desc').value;

            if (!title || !company) return alert("請輸入必填項目");

            if (id) {
                const idx = jobs.findIndex(j => j.id == id);
                if (idx !== -1 && (jobs[idx].ownerId === window.currentUser.uid || window.isAdmin)) {
                    jobs[idx] = { ...jobs[idx], title, company, salary, location, desc, logo: currentLogoBase64 || jobs[idx].logo };
                }
            } else {
                jobs.unshift({
                    id: Date.now(),
                    ownerId: window.currentUser.uid,
                    title, company, salary, location, desc,
                    logo: currentLogoBase64,
                    expiryDate: Date.now() + 604800000,
                    isPinned: false
                });
            }
            resetForm();
            togglePostForm();
            renderJobs();
        }

        function renderJobs() {
            const visitorList = document.getElementById('visitor-job-list');
            const employerList = document.getElementById('employer-job-list');
            if (!visitorList || !employerList) return;

            const sortedJobs = [...jobs].sort((a, b) => b.isPinned - a.isPinned || b.id - a.id);
            document.getElementById('job-count').innerText = sortedJobs.length;

            visitorList.innerHTML = sortedJobs.map(job => `
                <div class="job-card bg-white p-8 rounded-[40px] border border-slate-100 shadow-sm flex flex-col h-full ${job.isPinned ? 'pinned' : ''}">
                    <div class="flex items-center gap-4 mb-6">
                        ${job.logo ? `<img src="${job.logo}" class="w-14 h-14 rounded-2xl object-cover">` : `<div class="w-14 h-14 bg-slate-50 flex items-center justify-center font-black text-slate-300 rounded-2xl">${job.company[0]}</div>`}
                        <div class="overflow-hidden">
                            <h3 class="font-black text-slate-800 leading-tight truncate">${job.title}</h3>
                            <p class="text-blue-600 text-[10px] font-black uppercase mt-1 tracking-wider">${job.company}</p>
                        </div>
                    </div>
                    <div class="flex gap-2 mb-6">
                        <span class="text-[10px] font-bold bg-slate-50 text-slate-400 px-3 py-1 rounded-full">${job.location}</span>
                        <span class="text-[10px] font-bold bg-green-50 text-green-600 px-3 py-1 rounded-full">${job.salary}</span>
                    </div>
                    <p class="text-slate-500 text-sm mb-8 flex-grow line-clamp-3">${job.desc}</p>
                    <button onclick="openApplyModal(${job.id})" class="w-full py-4 bg-slate-900 text-white rounded-3xl font-black hover:bg-blue-600 transition shadow-lg">立即申請</button>
                </div>
            `).join('');

            if (window.currentUser) {
                const myVisible = window.isAdmin ? sortedJobs : sortedJobs.filter(j => j.ownerId === window.currentUser.uid);
                document.getElementById('my-job-count').innerText = myVisible.length;
                employerList.innerHTML = myVisible.map(job => `
                    <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm flex items-center justify-between">
                        <div>
                            <h4 class="font-black text-slate-800">${job.title}</h4>
                            <p class="text-[10px] text-slate-400 font-bold uppercase">${job.company} ${job.ownerId !== window.currentUser.uid ? '• [管理員檢視]' : ''}</p>
                        </div>
                        <div class="flex gap-2">
                            ${window.isAdmin ? `<button onclick="togglePin(${job.id})" class="p-2 ${job.isPinned ? 'text-amber-500 bg-amber-50' : 'text-slate-300'} rounded-xl"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M5 4a2 2 0 012-2h6a2 2 0 012 2v14l-5-2.5L5 18V4z"></path></svg></button>` : ''}
                            <button onclick="editJob(${job.id})" class="p-2 text-blue-500 bg-blue-50 rounded-xl"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" stroke-width="2"></path></svg></button>
                            <button onclick="deleteJob(${job.id})" class="p-2 text-red-500 bg-red-50 rounded-xl"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7" stroke-width="2"></path></svg></button>
                        </div>
                    </div>
                `).join('');
            }
        }

        function renderApplicants() {
            const list = document.getElementById('applicant-list');
            if(!list || !window.currentUser) return;
            const myApps = window.isAdmin ? applicants : applicants.filter(a => a.jobOwnerId === window.currentUser.uid);
            list.innerHTML = myApps.length === 0 ? `<div class="text-center py-12 text-slate-300 text-sm font-bold border-2 border-dashed rounded-[40px]">暫無申請資料</div>` : myApps.map(a => `
                <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                    <div class="flex justify-between items-start mb-2">
                        <span class="font-black text-slate-800">${a.name}</span>
                        <span class="text-[10px] font-black text-slate-300">${a.time}</span>
                    </div>
                    <p class="text-[10px] text-blue-600 font-black mb-3">應徵：${a.jobTitle}</p>
                    <div class="text-xs text-slate-500 mb-2">📞 ${a.phone}</div>
                    <div class="bg-slate-50 p-3 rounded-2xl text-[10px] text-slate-500 italic">"${a.experience}"</div>
                </div>
            `).join('');
        }

        window.editJob = (id) => {
            const job = jobs.find(j => j.id === id);
            if (job && (job.ownerId === window.currentUser.uid || window.isAdmin)) {
                document.getElementById('edit-job-id').value = job.id;
                document.getElementById('job-title').value = job.title;
                document.getElementById('job-company').value = job.company;
                document.getElementById('job-salary').value = job.salary;
                document.getElementById('job-location').value = job.location;
                document.getElementById('job-desc').value = job.desc;
                document.getElementById('post-form').classList.remove('hidden');
                window.scrollTo({ top: 400, behavior: 'smooth' });
            }
        };

        window.deleteJob = (id) => {
            const job = jobs.find(j => j.id === id);
            if (job && (job.ownerId === window.currentUser.uid || window.isAdmin)) {
                if (confirm('確定刪除此職位？')) {
                    jobs = jobs.filter(j => j.id !== id);
                    renderJobs();
                }
            }
        };

        window.togglePin = (id) => {
            if (!window.isAdmin) return;
            const idx = jobs.findIndex(j => j.id === id);
            if (idx !== -1) { jobs[idx].isPinned = !jobs[idx].isPinned; renderJobs(); }
        };

        window.openApplyModal = (id) => {
            const job = jobs.find(j => j.id === id);
            if(!job) return;
            window.currentJobToApply = job;
            document.getElementById('apply-job-name').innerText = `${job.title} @ ${job.company}`;
            document.getElementById('apply-modal').classList.remove('hidden');
        };

        window.closeApplyModal = () => document.getElementById('apply-modal').classList.add('hidden');

        window.submitApplication = () => {
            const name = document.getElementById('apply-name').value;
            const phone = document.getElementById('apply-phone').value;
            const exp = document.getElementById('apply-exp').value;
            if(!name || !phone) return alert("請填寫姓名與電話");
            
            applicants.unshift({
                id: Date.now(),
                jobId: window.currentJobToApply.id,
                jobOwnerId: window.currentJobToApply.ownerId,
                jobTitle: window.currentJobToApply.title,
                name, phone, experience: exp,
                time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
            });
            renderApplicants();
            closeApplyModal();
            alert("申請已送出！");
        };

        window.onload = () => { renderJobs(); renderAdBanner(); };
    </script>
</body>
</html>
